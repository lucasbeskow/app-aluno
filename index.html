<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="/styles.css" rel="stylesheet">
    <title>Login</title>
</head>

<body>

    <div class="container">

        <aside>
            <p>
                Educação não é aprendizado de fatos, mas o treinamento da mente para pensar.
                <span>Albert Einstein</span>
            </p>
        </aside>

        <main>
            <div class="cadastro">

                <h1>Bem-vindo de volta</h1>
                <p>Por favor, insira suas credenciais para acessar seu painel acadêmico</p>


                <form action="/enviar" method="post">

                    <label for="email">Endereço de e-mail</label>
                    <input id="email" name="email" type="text" placeholder="user@email.com" />

                    <label>
                        Senha
                        <a href="recuperar-senha.html">Esqueceu?</a>
                    </label>
                    <input type="password" />



                    <button type="submit">Entrar</button>

                </form>

                <p class="registro">Não tem conta? <a href="/cadastro-usuario.html">Registre-se agora</a></p>

            </div>
        </main>

    </div>



</body>

</html>
