<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/styles.css" rel="stylesheet">
    <title>Nova senha</title>
</head>

<body>

    <div class="container">

        <aside>
            <p>
                Educação não é aprendizado de fatos, mas o treinamento da mente para pensar.
                <span>Albert Einstein</span>
            </p>
        </aside>

        <main>

            <div class="cadastro">
                <h1>Nova Senha</h1>
                <p>Informe abaixo sua nova senha.</p>
        
                <form action="/login" method="post">
                    
                    <label for="senha">Senha</label>
                    <input name="senha" id="senha" type="password" />
        
                    <br/>
        
                    <label for="repitasenha">Repita a Senha</label>
                    <input name="repitasenha" id="repitasenha" type="password" />
        
                    <button type="submit">Salvar</button>
                </form>
            </div>


        </main>

    </div>



</body>

</html>
